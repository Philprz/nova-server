<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA — Connexion</title>
    <link rel="stylesheet" href="/static/it_spirit_styles.css">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-blue, #02B9FD) 0%, var(--primary-purple, #832DFE) 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .login-card {
            background: var(--white, #FFFFFF);
            padding: 40px 36px;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            width: 100%;
            max-width: 380px;
        }
        .login-card h1 {
            margin: 0 0 8px;
            font-size: 28px;
            color: var(--primary-purple, #832DFE);
            font-weight: 700;
        }
        .login-card .subtitle {
            margin: 0 0 24px;
            color: var(--gray-400, #94A3B8);
            font-size: 14px;
        }
        .login-card label {
            display: block;
            margin: 14px 0 6px;
            font-size: 13px;
            font-weight: 600;
            color: var(--gray-700, #334155);
        }
        .login-card input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px 12px;
            border: 1px solid var(--gray-300, #CBD5E1);
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.15s ease;
        }
        .login-card input:focus {
            outline: none;
            border-color: var(--primary-blue, #02B9FD);
        }
        .login-card button {
            width: 100%;
            margin-top: 24px;
            padding: 12px;
            background: linear-gradient(135deg, var(--primary-blue, #02B9FD), var(--primary-purple, #832DFE));
            color: var(--white, #FFFFFF);
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease;
        }
        .login-card button:hover { transform: translateY(-1px); }
        .login-card button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .error-message {
            margin-top: 16px;
            padding: 10px 12px;
            background: #FEE2E2;
            color: #991B1B;
            border-radius: 8px;
            font-size: 13px;
            display: none;
        }
        .error-message.visible { display: block; }
    </style>
</head>
<body>
    <main class="login-card">
        <h1>NOVA</h1>
        <p class="subtitle">Assistant IA pour devis — Connexion SAP</p>
        <form id="loginForm" autocomplete="on">
            <label for="sap_company_db">Société SAP</label>
            <input type="text" id="sap_company_db" name="sap_company_db" required autocomplete="organization">

            <label for="sap_username">Identifiant</label>
            <input type="text" id="sap_username" name="sap_username" required autocomplete="username">

            <label for="sap_password">Mot de passe</label>
            <input type="password" id="sap_password" name="sap_password" required autocomplete="current-password">

            <button type="submit" id="submitBtn">Se connecter</button>
            <div id="errorBox" class="error-message" role="alert"></div>
        </form>
    </main>

    <script>
        const form = document.getElementById('loginForm');
        const submitBtn = document.getElementById('submitBtn');
        const errorBox = document.getElementById('errorBox');

        function showError(message) {
            errorBox.textContent = message;
            errorBox.classList.add('visible');
        }

        function clearError() {
            errorBox.classList.remove('visible');
            errorBox.textContent = '';
        }

        function getRedirectTarget() {
            const params = new URLSearchParams(window.location.search);
            const redirect = params.get('redirect');
            if (redirect && redirect.startsWith('/')) {
                return redirect;
            }
            return '/interface/itspirit';
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            clearError();
            submitBtn.disabled = true;
            submitBtn.textContent = 'Connexion…';

            const payload = {
                sap_company_db: form.sap_company_db.value.trim(),
                sap_username: form.sap_username.value.trim(),
                sap_password: form.sap_password.value
            };

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: JSON.stringify(payload),
                    credentials: 'same-origin'
                });
                if (response.ok) {
                    window.location.href = getRedirectTarget();
                    return;
                }
                let detail = 'Erreur d\'authentification';
                try {
                    const body = await response.json();
                    if (body && body.detail) { detail = body.detail; }
                } catch (_) { /* ignore */ }
                showError(detail);
            } catch (err) {
                showError('Connexion au serveur impossible : ' + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Se connecter';
            }
        });
    </script>
</body>
</html>
